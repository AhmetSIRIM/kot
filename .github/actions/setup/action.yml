name: Setup build environment
description: The JDK and Gradle setup every job shares; jobs stay one uses-line away from it.

runs:
  using: composite
  steps:
    - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: temurin
        java-version: '17'

    # Wires Gradle build caching into Actions; dependency downloads are paid once per cache key.
    - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
