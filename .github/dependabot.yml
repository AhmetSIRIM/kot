version: 2
updates:
  # The version catalog and plugin versions.
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    # Deliberate policy, not a stale suppression: the compileOnly AGP pin stays at the floor
    # (the wiring compiles against the 8.1 Variants API; see the README's Compatibility
    # section), so major/minor bumps of gradle-api only propose breaking that commitment.
    # Patch bumps stay allowed (same API surface). Security ALERTS are unaffected: they flow
    # from the dependency graph, not from this version-update schedule.
    ignore:
      - dependency-name: com.android.tools.build:gradle-api
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      # CVE-triggered updates arrive as one PR per ecosystem instead of one per advisory.
      security-updates:
        applies-to: security-updates
        patterns: ["*"]

  # Action versions in the workflows. directory: / covers .github/workflows ONLY;
  # composite actions are separate ecosystems roots and need their own entries below.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]

  # The setup composite's own action pins; invisible to the entry above.
  - package-ecosystem: github-actions
    directory: /.github/actions/setup
    schedule:
      interval: weekly
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
