name: Publish

# workflow_dispatch is the manual re-run door: launched against a tag it re-enters the same
# validation; launched from a branch it validates nothing and publishes nothing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# A publish must never be cancelled halfway by a newer trigger.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Release-only and canonical on purpose: vMAJOR.MINOR.PATCH, no suffix, no leading zeros.
      # A suffixed tag (-rc.1, -SNAPSHOT) is almost always a mistake here (the scheme ships no
      # pre-releases, and the Portal rejects snapshots), and a leading zero (v0.01.0) would
      # neither publish verbatim nor sort correctly in the monotonic step below.
      - name: Assert tag is a canonical release version
        if: github.ref_type == 'tag'
        run: |
          echo "Validating tag: ${GITHUB_REF_NAME}"
          echo "${GITHUB_REF_NAME}" | grep -Eq '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' \
            || { echo "Tag '${GITHUB_REF_NAME}' is not a valid release version vMAJOR.MINOR.PATCH (canonical numbers, no suffix)."; exit 1; }

      # Rejects a version that is not strictly greater than the highest already-released one,
      # catching an accidental downgrade an immutable registry would accept and never undo.
      # Git tags are the source of truth (published tags are never re-pointed or deleted, so
      # they are a superset of what is published); the tag fetch is fail-closed in its own
      # statement, the current tag is excluded so a dispatch re-run of the same tag passes,
      # and sort -V compares semver numerically (1.10.0 above 1.9.0).
      - name: Assert version is monotonic
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          new="${GITHUB_REF_NAME#v}"
          tags="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/tags" --jq '.[].name')"
          latest="$(
            printf '%s\n' "${tags}" \
              | grep -E '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' \
              | grep -vxF -- "${GITHUB_REF_NAME}" \
              | sed 's/^v//' \
              | sort -V \
              | tail -n1 || true
          )"
          if [ -z "${latest}" ]; then
            echo "No prior release tag; treating ${GITHUB_REF_NAME} as the initial release."
            exit 0
          fi
          if [ "${new}" = "${latest}" ] || \
             [ "$(printf '%s\n%s\n' "${new}" "${latest}" | sort -V | tail -n1)" != "${new}" ]; then
            echo "Tag ${GITHUB_REF_NAME} is not strictly greater than the latest released version (v${latest}); refusing a downgrade or re-release."
            exit 1
          fi
          echo "Monotonic check passed: ${new} is greater than ${latest}."

  publish:
    needs: [validate-tag]
    # The actor gate is redundant today (tag pushes and dispatches already require write
    # access, and there is one writer); it becomes load-bearing the day a collaborator
    # arrives. Owner-only by comparison, no hardcoded name; a future co-maintainer setup
    # replaces this with an explicit list or an environment protection rule.
    if: github.ref_type == 'tag' && github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # gh release create writes a release; everything else only reads.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      # The same property local builds fall back around: the tag is the single source of the
      # published version (ORG_GRADLE_PROJECT_* env vars become Gradle project properties).
      - name: Derive the version from the tag
        run: echo "ORG_GRADLE_PROJECT_VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # The pre-publish gate: the tagged commit re-proves the full check inside this very run,
      # closing the "tag pushed from a commit that never went through a PR" hole.
      - name: Run check
        run: ./gradlew check --stacktrace

      # Makes the run re-runnable after a partial failure: publishPlugins is not idempotent
      # (the Portal rejects an already-live version), so a failure in any LATER step would
      # otherwise leave a run that can never go green for this tag. Checks the Portal's Maven
      # face for the plugin marker of this exact version. Known edge: a version sitting in
      # first-publish manual approval is not served here yet, so this guard arms itself for
      # every release after the initial approval.
      - name: Check whether this version is already on the Portal
        id: portal
        run: |
          version="${GITHUB_REF_NAME#v}"
          marker_url="https://plugins.gradle.org/m2/io/github/ahmetsirim/kot/io.github.ahmetsirim.kot.gradle.plugin/${version}/"
          status="$(curl -s -o /dev/null -w '%{http_code}' "${marker_url}")"
          echo "published=$([ "${status}" = "200" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Portal marker returned HTTP ${status} for ${version}."

      - name: Publish to the Gradle Plugin Portal
        if: steps.portal.outputs.published == 'false'
        run: ./gradlew publishPlugins --stacktrace
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

      # The version history stays visible next to the code once the repository is public; the
      # note leads with the exact snippet a consumer pastes. Re-runs skip instead of failing
      # when the release already exists (a tag re-run stops earlier anyway, at the Portal
      # rejecting the already-live version).
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; skipping."
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes \
              --notes "Published to the Gradle Plugin Portal: \`id(\"io.github.ahmetsirim.kot\") version \"${GITHUB_REF_NAME#v}\"\`"
          fi
