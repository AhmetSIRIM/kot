name: PR Check

on:
  pull_request:
    branches: [main]

# A superseded push to the same PR cancels the run it replaces; only the latest commit's
# verdict matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Every job only reads the repository; granting nothing else keeps a compromised dependency
# from writing back.
permissions:
  contents: read

jobs:
  # The unit layer alone: plain JVM tests, no TestKit, no Android SDK. Its own job on purpose:
  # the verdict lands minutes before the functional suite finishes, and a red here names the
  # failure class (a broken contract, not build behavior) straight from the checks list.
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run unit tests
        run: ./gradlew test --stacktrace
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: unit-test-reports
          path: build/reports/tests/test/

  # The behavioral spec: all functional tests, including the real-AGP end-to-end test
  # (the ubuntu runner image ships the Android SDK preinstalled).
  functional-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Cold caches pay the AGP dependency downloads; a hung daemon must not run for the default 6 hours.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run functional tests
        run: ./gradlew functionalTest --stacktrace
      # Reports only matter when something failed; upload them for post-mortem then.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: functional-test-reports
          path: build/reports/tests/functionalTest/

  # Static analysis; rules build upon detekt's defaults with the deviations kept in
  # config/detekt/detekt.yml.
  detekt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run detekt
        run: ./gradlew detekt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: detekt-reports
          path: build/reports/detekt/

  # KDoc gate: dokkaGenerate fails on any warning (broken doc links included), keeping the
  # documentation shippable at every commit; it becomes the published docs at release time.
  dokka-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Generate documentation
        run: ./gradlew dokkaGenerate

  # Two rings of publish validation:
  #   - validatePlugins: the static ring (task annotations, plugin descriptor); always runs.
  #   - publishPlugins --validate-only: the strong ring; catches on the PR what would
  #     otherwise fail at release time, in the tag run's publish step. It submits the real
  #     publication and the Portal judges it as if publishing: dead credentials, required
  #     Portal metadata gone missing (description, website/vcs links, tags), a broken
  #     sources/javadoc wiring. It needs the Portal keys, and secrets do not flow into
  #     fork PRs, so that STEP is skipped for forks; a job-level skip would turn the
  #     summary gate red instead (skipped counts as failed there, on purpose).
  #
  # VERSION_NAME=0.0.0 is a validation sentinel, not a real version: the Portal rejects a
  # version that exists already even under --validate-only, and 0.0.0 can never be released
  # (the publish workflow only accepts tags strictly greater than the latest release).
  publish-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Validate plugin metadata
        run: ./gradlew validatePlugins
      - name: Dry-run the publication against the Portal
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: ./gradlew publishPlugins --validate-only -PVERSION_NAME=0.0.0
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

  # Lints the automation itself: actionlint catches YAML and expression mistakes (a wrong
  # context name, a bad needs reference, a broken shell fragment), zizmor catches
  # Actions-specific security anti-patterns (unpinned actions, credential persistence,
  # script injection). The other jobs guard the code; this one guards the pipeline.
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color
      - name: Run zizmor
        env:
          GH_TOKEN: ${{ github.token }} # Lets zizmor resolve pinned SHAs against the owning repos.
        run: pipx run zizmor==1.27.0 --no-progress .github/workflows .github/actions

  # The one job branch protection marks as required: green only when every job above is.
  summary:
    needs: [unit-test, functional-test, detekt, dokka-build, publish-validation, workflow-lint]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # skipped counts as failed here: branch protection treats a skipped required check as
      # passed, so a dependency that silently stopped running must turn this gate red.
      - name: Fail unless every dependency succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1
