name: PR Check

on:
  pull_request:
    branches: [main]

# A superseded push to the same PR cancels the run it replaces; only the latest commit's
# verdict matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The job only reads the repository; granting nothing else keeps a compromised dependency
# from writing back.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # Wires Gradle build caching into Actions; the AGP end-to-end test's dependency
      # downloads are paid once, then served from cache.
      - uses: gradle/actions/setup-gradle@v6

      # The whole gate: compilation, validatePlugins, and the functional suite, including
      # the real-AGP test (the ubuntu runner image ships the Android SDK preinstalled).
      - name: Run check
        run: ./gradlew check --stacktrace

      # Test reports only matter when something failed; upload them for post-mortem then.
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-reports
          path: build/reports/tests/
