name: Dependency Graph

# Feeds the resolved Gradle dependency tree into GitHub's dependency graph through the
# Dependency Submission API. GitHub cannot parse Gradle builds statically (version catalogs
# and dynamic resolution defeat manifest parsing), so before this job the graph only saw the
# workflows' actions; Dependabot alerts were blind to every library dependency.
#
# The submitted tree is the RESOLVED one, transitives included: the part that neither a human
# reading the version catalog nor the weekly Dependabot version updates can patrol.
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  submit-dependency-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # The Dependency Submission API stores a snapshot on the repository.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # setup-java directly instead of the setup composite: dependency-submission embeds its
      # own Gradle provisioning, so the composite's setup-gradle step would double-initialize.
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'
      - name: Resolve and submit the dependency graph
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
